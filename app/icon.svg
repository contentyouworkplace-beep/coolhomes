<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <circle cx="16" cy="16" r="16" fill="#2563EB"/>
  <!-- Snowflake: center dot -->
  <circle cx="16" cy="16" r="2" fill="white"/>
  <!-- Horizontal arm -->
  <line x1="8" y1="16" x2="24" y2="16" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <!-- Vertical arm -->
  <line x1="16" y1="8" x2="16" y2="24" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <!-- Diagonal arms -->
  <line x1="10.34" y1="10.34" x2="21.66" y2="21.66" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="21.66" y1="10.34" x2="10.34" y2="21.66" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <!-- Horizontal arm ticks -->
  <line x1="8" y1="14" x2="8" y2="18" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="24" y1="14" x2="24" y2="18" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Vertical arm ticks -->
  <line x1="14" y1="8" x2="18" y2="8" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="14" y1="24" x2="18" y2="24" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
</svg>
