<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180">
  <circle cx="90" cy="90" r="90" fill="#FF6B00"/>
  <!-- Snowflake: center dot -->
  <circle cx="90" cy="90" r="10" fill="white"/>
  <!-- Horizontal arm -->
  <line x1="36" y1="90" x2="144" y2="90" stroke="white" stroke-width="10" stroke-linecap="round"/>
  <!-- Vertical arm -->
  <line x1="90" y1="36" x2="90" y2="144" stroke="white" stroke-width="10" stroke-linecap="round"/>
  <!-- Diagonal arms -->
  <line x1="52" y1="52" x2="128" y2="128" stroke="white" stroke-width="10" stroke-linecap="round"/>
  <line x1="128" y1="52" x2="52" y2="128" stroke="white" stroke-width="10" stroke-linecap="round"/>
  <!-- Horizontal arm ticks -->
  <line x1="36" y1="78" x2="36" y2="102" stroke="white" stroke-width="8" stroke-linecap="round"/>
  <line x1="144" y1="78" x2="144" y2="102" stroke="white" stroke-width="8" stroke-linecap="round"/>
  <!-- Vertical arm ticks -->
  <line x1="78" y1="36" x2="102" y2="36" stroke="white" stroke-width="8" stroke-linecap="round"/>
  <line x1="78" y1="144" x2="102" y2="144" stroke="white" stroke-width="8" stroke-linecap="round"/>
</svg>
